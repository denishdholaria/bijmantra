[importlinter]
root_package = app
include_external_packages = False

[importlinter:contract:1]
name = Domain boundaries - No cross-domain imports
type = forbidden
source_modules =
    app.modules.breeding
    app.modules.genomics
    app.modules.phenotyping
    app.modules.germplasm
    app.modules.environment
    app.modules.spatial
    app.modules.ai
    app.modules.interop
forbidden_modules =
    app.modules.breeding
    app.modules.genomics
    app.modules.phenotyping
    app.modules.germplasm
    app.modules.environment
    app.modules.spatial
    app.modules.ai
    app.modules.interop
allow_indirect_imports = False

[importlinter:contract:2]
name = Core domain - Allowed by all
type = layers
layers =
    app.modules.core
containers =
    app.modules

[importlinter:contract:3]
name = Layer contract - API cannot import from compute
type = forbidden
source_modules =
    app.modules.*.router
forbidden_modules =
    app.modules.*.compute
allow_indirect_imports = False

[importlinter:contract:4]
name = Layer contract - API cannot import from models directly
type = forbidden
source_modules =
    app.modules.*.router
forbidden_modules =
    app.modules.*.models
allow_indirect_imports = False

[importlinter:contract:5]
name = Layer contract - Services can import models and compute
type = layers
layers =
    app.modules.*.router
    app.modules.*.service
    app.modules.*.services
    app.modules.*.models
    app.modules.*.compute
containers =
    app.modules

[importlinter:contract:6]
name = No new services in flat directory
type = forbidden
source_modules =
    app
forbidden_modules =
    app.services
allow_indirect_imports = True
unmatched_ignore_imports =
    # Allow existing services during migration
    app.services.task_queue
    app.services.compute_engine
    app.services.event_bus
