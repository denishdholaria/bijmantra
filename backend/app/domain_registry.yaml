# Domain boundaries and contracts
contracts:
  core:
    provides:
      - authentication
      - authorization
      - audit_logging
      - event_bus
      - job_queue
      - rate_limiting
      - data_import
      - compliance
    consumers:
      - all domains
  
  breeding:
    provides:
      - breeding_programs
      - crosses
      - trials
      - breeding_values
      - selection_indices
    depends_on:
      - core
      - genomics
      - phenotyping
      - germplasm
  
  genomics:
    provides:
      - gwas_analysis
      - genomic_selection
      - marker_analysis
      - genetic_diversity
    depends_on:
      - core
      - germplasm
  
  phenotyping:
    provides:
      - observations
      - phenotype_analysis
      - image_analysis
      - vision_models
    depends_on:
      - core
      - spatial
  
  germplasm:
    provides:
      - germplasm_management
      - seed_inventory
      - passport_data
    depends_on:
      - core
  
  environment:
    provides:
      - weather_data
      - climate_analysis
      - gdd_calculation
      - environmental_monitoring
    depends_on:
      - core
      - spatial
  
  spatial:
    provides:
      - geospatial_analysis
      - maps
      - location_services
    depends_on:
      - core
  
  ai:
    provides:
      - veena_assistant
      - recommendations
      - ml_services
      - cognitive_functions
    depends_on:
      - core
      - all domains (for context)
  
  interop:
    provides:
      - brapi_endpoints
      - external_integrations
      - iot_integration
      - robotics_control
    depends_on:
      - core
      - all domains (for data exchange)
