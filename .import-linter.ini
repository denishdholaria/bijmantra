[importlinter]
root_package = app
include_external_packages = False

[importlinter:contract:1]
name = Core domain independence
type = independence
modules =
    app.modules.core

[importlinter:contract:2]
name = Breeding domain boundaries
type = layers
layers =
    app.modules.breeding
    app.modules.genomics
    app.modules.phenotyping
    app.modules.germplasm
    app.core
containers =
    app.modules.breeding

[importlinter:contract:3]
name = Genomics domain boundaries
type = layers
layers =
    app.modules.genomics
    app.modules.germplasm
    app.core
containers =
    app.modules.genomics

[importlinter:contract:4]
name = Phenotyping domain boundaries
type = layers
layers =
    app.modules.phenotyping
    app.modules.spatial
    app.core
containers =
    app.modules.phenotyping

[importlinter:contract:5]
name = Germplasm domain boundaries
type = layers
layers =
    app.modules.germplasm
    app.core
containers =
    app.modules.germplasm

[importlinter:contract:6]
name = Environment domain boundaries
type = layers
layers =
    app.modules.environment
    app.modules.spatial
    app.core
containers =
    app.modules.environment

[importlinter:contract:7]
name = Spatial domain boundaries
type = layers
layers =
    app.modules.spatial
    app.core
containers =
    app.modules.spatial

[importlinter:contract:8]
name = AI domain boundaries
type = layers
layers =
    app.modules.ai
    app.core
containers =
    app.modules.ai

[importlinter:contract:9]
name = Interop domain boundaries
type = layers
layers =
    app.modules.interop
    app.core
containers =
    app.modules.interop

[importlinter:contract:10]
name = No direct cross-domain imports
type = forbidden
source_modules =
    app.modules.breeding
    app.modules.genomics
    app.modules.phenotyping
    app.modules.germplasm
    app.modules.environment
    app.modules.spatial
    app.modules.ai
    app.modules.interop
forbidden_modules =
    app.modules.breeding
    app.modules.genomics
    app.modules.phenotyping
    app.modules.germplasm
    app.modules.environment
    app.modules.spatial
    app.modules.ai
    app.modules.interop
ignore_imports =
    app.modules.* -> app.core.*
    app.modules.* -> app.models.*
    app.modules.* -> app.schemas.*
    app.modules.* -> app.services.event_bus

[importlinter:contract:11]
name = Layer contract - API to Service only
type = forbidden
source_modules =
    app.api
forbidden_modules =
    app.db
    app.models
ignore_imports =
    app.api.* -> app.schemas.*
    app.api.* -> app.core.*

[importlinter:contract:12]
name = No new services in flat directory
type = forbidden
source_modules =
    app.modules.*
forbidden_modules =
    app.services
ignore_imports =
    app.modules.* -> app.services.event_bus
    app.modules.* -> app.services.task_queue
    app.modules.* -> app.services.compute_engine
