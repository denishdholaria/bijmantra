# Bijmantra Compute Workers Docker Compose
# Usage: docker compose -f compose.yaml -f compose.workers.yaml up -d
#
# This file adds compute workers to the base deployment
# Workers are isolated from API servers for stability

version: "3.8"

services:
  # Light Compute Workers (Python-only, < 30s)
  # Deploy multiple instances for high concurrency
  light-worker-1:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
      target: light-worker
    image: bijmantra-light-worker:${APP_VERSION:-latest}
    container_name: bijmantra-light-worker-1
    restart: always
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - WORKER_ID=light-worker-1
      - MAX_CONCURRENT=10
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bijmantra-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      replicas: 2  # Deploy 2 light workers

  light-worker-2:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
      target: light-worker
    image: bijmantra-light-worker:${APP_VERSION:-latest}
    container_name: bijmantra-light-worker-2
    restart: always
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - WORKER_ID=light-worker-2
      - MAX_CONCURRENT=10
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bijmantra-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Heavy Compute Workers (Rust/Fortran, > 30s)
  # Deploy fewer instances with more resources
  heavy-worker-1:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
      target: heavy-worker
    image: bijmantra-heavy-worker:${APP_VERSION:-latest}
    container_name: bijmantra-heavy-worker-1
    restart: always
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - WORKER_ID=heavy-worker-1
      - MAX_CONCURRENT=2
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bijmantra-network
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'
        reservations:
          memory: 2G
          cpus: '2'

  # GPU Compute Workers (WebGPU/CUDA)
  # Only deploy if GPU is available
  # Uncomment to enable GPU workers
  # gpu-worker-1:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile.worker
  #     target: gpu-worker
  #   image: bijmantra-gpu-worker:${APP_VERSION:-latest}
  #   container_name: bijmantra-gpu-worker-1
  #   restart: always
  #   environment:
  #     - ENVIRONMENT=${ENVIRONMENT:-production}
  #     - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  #     - REDIS_URL=redis://redis:6379
  #     - WORKER_ID=gpu-worker-1
  #     - MAX_CONCURRENT=1
  #     - GPU_ID=0
  #     - LOG_LEVEL=${LOG_LEVEL:-INFO}
  #     - CUDA_VISIBLE_DEVICES=0
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   networks:
  #     - bijmantra-network
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 8G
  #       reservations:
  #         memory: 4G
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]

networks:
  bijmantra-network:
    external: true
